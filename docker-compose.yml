version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: digital-barn-finds-postgres
    environment:
      POSTGRES_DB: digital_barn_finds
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d digital_barn_finds"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:

