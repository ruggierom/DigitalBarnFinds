name: Deploy API

# Production deploy workflow with post-deploy health check.

on:
  push:
    branches: [main]
    paths:
      - "apps/api/**"
      - ".github/workflows/deploy-api.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-api-main
      cancel-in-progress: true
    permissions:
      id-token: write
      contents: read
    env:
      AZURE_CREDENTIALS: ${{ secrets.AZURE_CREDENTIALS }}
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Choose Azure auth mode
        id: azure-auth
        run: |
          if [ -n "${AZURE_CREDENTIALS}" ]; then
            echo "mode=creds" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          if [ -n "${AZURE_CLIENT_ID}" ] && [ -n "${AZURE_TENANT_ID}" ] && [ -n "${AZURE_SUBSCRIPTION_ID}" ]; then
            echo "mode=oidc" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          echo "::error::Configure either AZURE_CREDENTIALS or the OIDC secrets AZURE_CLIENT_ID, AZURE_TENANT_ID, and AZURE_SUBSCRIPTION_ID."
          exit 1
      - name: Azure login
        if: steps.azure-auth.outputs.mode == 'creds'
        uses: azure/login@v2
        with:
          creds: ${{ env.AZURE_CREDENTIALS }}
      - name: Azure login with OIDC
        if: steps.azure-auth.outputs.mode == 'oidc'
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Deploy API
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_API_APP_NAME }}
          package: ./apps/api
      - name: Smoke test API
        run: |
          set -u

          API_BASE="https://${{ secrets.AZURE_API_APP_NAME }}.azurewebsites.net"

          check_health() {
            curl -fsS --max-time 20 "${API_BASE}/healthz" | grep -q '"status":"ok"'
          }

          check_stats() {
            stats="$(curl -fsS --max-time 20 "${API_BASE}/stats")" || return 1
            printf '%s' "${stats}" | grep -q '"total_cars":' &&
              printf '%s' "${stats}" | grep -q '"cars_with_media":' &&
              printf '%s' "${stats}" | grep -q '"watchlist_count":'
          }

          for attempt in 1 2 3 4 5 6; do
            echo "Checking ${API_BASE}/healthz and ${API_BASE}/stats (attempt ${attempt})"
            if check_health && check_stats; then
              exit 0
            fi
            sleep 10
          done

          echo "API smoke test failed."
          exit 1
      - name: Backfill managed media
        env:
          API_BASE: https://${{ secrets.AZURE_API_APP_NAME }}.azurewebsites.net
          API_ADMIN_TOKEN: ${{ secrets.API_ADMIN_TOKEN }}
        run: |
          set -eu

          for batch in $(seq 1 30); do
            echo "Backfill batch ${batch}"
            response="$(curl -fsS --max-time 600 -X POST -H "x-admin-token: ${API_ADMIN_TOKEN}" "${API_BASE}/admin/jobs/cache-media?limit=100")"
            echo "${response}"

            updated="$(python -c 'import json,sys; print(json.loads(sys.stdin.read())["updated"])' <<< "${response}")"
            remaining="$(python -c 'import json,sys; print(json.loads(sys.stdin.read())["remaining_remote"])' <<< "${response}")"

            if [ "${remaining}" = "0" ] || [ "${updated}" = "0" ]; then
              echo "Backfill complete or stalled after batch ${batch}."
              exit 0
            fi
          done

          echo "Backfill loop hit the safety cap with remote media still remaining."
          exit 1
