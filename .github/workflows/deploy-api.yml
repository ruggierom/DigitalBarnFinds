name: Deploy API

on:
  push:
    branches: [main]
    paths:
      - "apps/api/**"
      - ".github/workflows/deploy-api.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-api-main
      cancel-in-progress: true
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Deploy API
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_API_APP_NAME }}
          package: ./apps/api
      - name: Smoke test API health
        run: |
          API_URL="https://${{ secrets.AZURE_API_APP_NAME }}.azurewebsites.net/healthz"
          for attempt in 1 2 3 4 5 6; do
            echo "Checking ${API_URL} (attempt ${attempt})"
            if curl -fsS --max-time 20 "${API_URL}" | grep -q '"status":"ok"'; then
              exit 0
            fi
            sleep 10
          done
          echo "API health smoke test failed."
          exit 1
