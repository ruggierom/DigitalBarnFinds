name: Live Import Cars

# Trigger note: production batched image-backed import workflow. Refresh trigger 2026-03-16-3.

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/live-import.yml"
  workflow_dispatch:
  workflow_run:
    workflows: ["Deploy API"]
    types:
      - completed

jobs:
  prepare:
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'push' ||
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    concurrency:
      group: live-import-main
      cancel-in-progress: true
    steps:
      - name: Health check production API
        run: curl -f --max-time 20 https://digitalbarnfinds-api.azurewebsites.net/healthz

      - name: Seed production sources
        env:
          API_ADMIN_TOKEN: ${{ secrets.API_ADMIN_TOKEN }}
        run: |
          curl -f --max-time 180 \
            -X POST \
            -H "x-admin-token: ${API_ADMIN_TOKEN}" \
            "https://digitalbarnfinds-api.azurewebsites.net/admin/jobs/seed"

  import:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        scraper_key:
          - aguttes
          - artcurial
          - bat
          - barchetta
          - historics
          - iconic
          - mecum
          - osenat
    steps:
      - name: Import 5 cars with images for ${{ matrix.scraper_key }}
        env:
          API_ADMIN_TOKEN: ${{ secrets.API_ADMIN_TOKEN }}
          SCRAPER_KEY: ${{ matrix.scraper_key }}
        run: |
          curl -f --max-time 180 \
            -X POST \
            -H "x-admin-token: ${API_ADMIN_TOKEN}" \
            "https://digitalbarnfinds-api.azurewebsites.net/admin/jobs/fetch?limit=5&ignore_without_images=true&scraper_key=${SCRAPER_KEY}"

  score:
    needs: import
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Recompute darkness scores
        env:
          API_ADMIN_TOKEN: ${{ secrets.API_ADMIN_TOKEN }}
        run: |
          curl -f --max-time 180 \
            -X POST \
            -H "x-admin-token: ${API_ADMIN_TOKEN}" \
            "https://digitalbarnfinds-api.azurewebsites.net/admin/jobs/score"
