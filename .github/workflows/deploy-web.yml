name: Deploy Web

# Production deploy workflow with post-deploy UI smoke check.

on:
  push:
    branches: [main]
    paths:
      - "apps/web/**"
      - ".github/workflows/deploy-web.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-web-main
      cancel-in-progress: true
    permissions:
      id-token: write
      contents: read
    env:
      AZURE_CREDENTIALS: ${{ secrets.AZURE_CREDENTIALS }}
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Install web dependencies
        run: npm install
      - name: Build web app
        run: npm run build --workspace web
      - name: Choose Azure auth mode
        id: azure-auth
        run: |
          if [ -n "${AZURE_CREDENTIALS}" ]; then
            echo "mode=creds" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          if [ -n "${AZURE_CLIENT_ID}" ] && [ -n "${AZURE_TENANT_ID}" ] && [ -n "${AZURE_SUBSCRIPTION_ID}" ]; then
            echo "mode=oidc" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          echo "::error::Configure either AZURE_CREDENTIALS or the OIDC secrets AZURE_CLIENT_ID, AZURE_TENANT_ID, and AZURE_SUBSCRIPTION_ID."
          exit 1
      - name: Azure login
        if: steps.azure-auth.outputs.mode == 'creds'
        uses: azure/login@v2
        with:
          creds: ${{ env.AZURE_CREDENTIALS }}
      - name: Azure login with OIDC
        if: steps.azure-auth.outputs.mode == 'oidc'
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Deploy to App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEB_APP_NAME }}
          package: ./apps/web
      - name: Smoke test web UI
        run: |
          set -u

          WEB_BASE="https://${{ secrets.AZURE_WEB_APP_NAME }}.azurewebsites.net"

          check_dashboard() {
            page="$(curl -fLsS --max-time 20 "${WEB_BASE}/dashboard")" || return 1
            printf '%s' "${page}" | grep -q "Research dashboard" &&
              printf '%s' "${page}" | grep -q "currently dark"
          }

          check_cars() {
            page="$(curl -fLsS --max-time 20 "${WEB_BASE}/cars?view=data")" || return 1
            printf '%s' "${page}" | grep -q "Vehicle ID" &&
              printf '%s' "${page}" | grep -q "Data view" &&
              printf '%s' "${page}" | grep -q "Export CSV"
          }

          for attempt in 1 2 3 4 5 6; do
            echo "Checking ${WEB_BASE}/dashboard and ${WEB_BASE}/cars?view=data (attempt ${attempt})"
            if check_dashboard && check_cars; then
              exit 0
            fi
            sleep 15
          done

          echo "Web smoke test failed."
          exit 1
