name: Deploy Web

on:
  push:
    branches: [main]
    paths:
      - "apps/web/**"
      - ".github/workflows/deploy-web.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-web-main
      cancel-in-progress: true
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Install web dependencies
        run: npm install
      - name: Build web app
        run: npm run build --workspace web
      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Deploy to App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEB_APP_NAME }}
          package: ./apps/web
      - name: Smoke test web UI
        run: |
          WEB_URL="https://${{ secrets.AZURE_WEB_APP_NAME }}.azurewebsites.net/cars"
          for attempt in 1 2 3 4 5 6; do
            echo "Checking ${WEB_URL} (attempt ${attempt})"
            page="$(curl -fLsS --max-time 20 "${WEB_URL}" || true)"
            if printf '%s' "${page}" | grep -q "Data view"; then
              exit 0
            fi
            sleep 15
          done
          echo "Web smoke test failed: Data view marker not found."
          exit 1
