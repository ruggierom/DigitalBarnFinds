name: Adapter Contract

on:
  pull_request:
    paths:
      - "apps/api/**"
      - ".github/workflows/adapter-contract.yml"
  push:
    branches: [main]
    paths:
      - "apps/api/**"
      - ".github/workflows/adapter-contract.yml"
  workflow_dispatch:

jobs:
  adapter-contract:
    runs-on: ubuntu-latest
    concurrency:
      group: adapter-contract-${{ github.ref }}
      cancel-in-progress: true
    permissions:
      contents: read
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            apps/api/pyproject.toml
            apps/api/requirements.txt

      - name: Install API dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Run adapter contract suite
        run: |
          set +e
          python tests/adapter_runner.py --all --output json > adapter_runner_results.json
          runner_status=$?
          python - <<'PY'
          import json
          from pathlib import Path

          payload = json.loads(Path("adapter_runner_results.json").read_text())
          adapters = payload.get("adapters", [])
          fixture_count = sum(
              len(adapter.get("layers", {}).get("fixtures", {}).get("fixtures", []))
              for adapter in adapters
          )
          assertion_count = sum(
              adapter.get("layers", {}).get("contract", {}).get("assertions", 0)
              + adapter.get("layers", {}).get("manifest", {}).get("assertions", 0)
              + sum(
                  fixture.get("assertions", 0)
                  for fixture in adapter.get("layers", {}).get("fixtures", {}).get("fixtures", [])
              )
              for adapter in adapters
          )
          failure_count = sum(
              len(adapter.get("layers", {}).get("contract", {}).get("failures", []))
              + len(adapter.get("layers", {}).get("manifest", {}).get("failures", []))
              + len(adapter.get("layers", {}).get("fixtures", {}).get("failures", []))
              for adapter in adapters
          )

          print("DBF Adapter Contract Summary")
          print("=" * 72)
          print(f"Adapters: {len(adapters)}")
          print(f"Fixtures: {fixture_count}")
          print(f"Assertions: {assertion_count}")
          print(f"Failures: {failure_count}")
          for adapter in adapters:
              status = "PASS" if adapter.get("pass") else "FAIL"
              name = adapter.get("source_key", "unknown")
              display_name = adapter.get("display_name", name)
              fixtures = adapter.get("layers", {}).get("fixtures", {}).get("fixtures", [])
              print(f"- [{status}] {name} ({display_name}) with {len(fixtures)} fixtures")
          PY
          exit $runner_status

      - name: Upload adapter contract report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: adapter-runner-results
          path: apps/api/adapter_runner_results.json
          if-no-files-found: ignore
